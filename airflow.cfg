[core]
# Airflow home directory (change if needed)
airflow_home = /opt/airflow

# Executor type (Celery for distributed tasks, or 'SequentialExecutor' for simple setups)
executor = CeleryExecutor

# Default DAGs folder
dags_folder = /opt/airflow/dags

# Folder to store logs
base_log_folder = /opt/airflow/logs

# The host for running Airflow (for Docker use '0.0.0.0', for localhost keep 'localhost')
hostname_callable = socket.getfqdn

[webserver]
# The base URL of the Airflow webserver
base_url = http://localhost:8080

# Web server hostname (for Docker use 0.0.0.0)
web_server_host = 0.0.0.0

# Web server port
web_server_port = 8080

# User authentication (set to True if using authentication)
authenticate = False

# Log fetching timeout
log_fetch_timeout_sec = 5

# Ensure `hostname_callable` is correctly set
hostname_callable = airflow.utils.net.get_host_ip_address

[logging]
# Enable remote logging (change to True if using S3/GCS/NFS)
remote_logging = False
remote_base_log_folder = 

[celery]
# Broker URL for Celery (RabbitMQ or Redis)
broker_url = redis://redis:6379/0

# Celery backend for storing results
result_backend = db+postgresql://airflow:airflow@postgres/airflow

# Number of Celery workers
worker_concurrency = 4

worker_log_server_port = 8793  # Ensure this is set

[scheduler]
# DAG parsing interval
min_file_process_interval = 30

# Max parallel tasks per DAG
max_active_runs_per_dag = 3